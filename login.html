<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  /* Attractive gradient background */
  background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
  padding: 20px;
}

.box {
  width: 100%;
  max-width: 420px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  padding: 40px 30px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.1);
  text-align: center;
  color: white;
  position: relative;
  overflow: hidden;
}

.box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80') center/cover no-repeat;
  opacity: 0.2;
  z-index: -1;
}

h2 {
  font-size: 32px;
  margin-bottom: 30px;
  font-weight: 700;
  letter-spacing: 1px;
  text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
}

.form-group {
  margin-bottom: 25px;
  position: relative;
}

input {
  width: 100%;
  padding: 15px 15px 15px 45px;
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-radius: 10px;
  font-size: 16px;
  color: white;
  transition: all 0.3s ease;
  outline: none;
}

input::placeholder {
  color: rgba(255, 255, 255, 0.7);
}

input:focus {
  border-color: rgba(255, 255, 255, 0.5);
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
}

.icon {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255, 255, 255, 0.7);
  font-size: 18px;
}

button {
  width: 100%;
  padding: 16px;
  background: linear-gradient(to right, #ff7e5f, #feb47b);
  border: none;
  border-radius: 10px;
  font-size: 18px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 10px;
  letter-spacing: 1px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

button:hover {
  background: linear-gradient(to right, #feb47b, #ff7e5f);
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}

button:active {
  transform: translateY(0);
}

.register-link {
  margin-top: 25px;
  font-size: 16px;
}

.register-link a {
  color: #ffcc00;
  text-decoration: none;
  font-weight: 600;
  transition: color 0.3s ease;
}

.register-link a:hover {
  color: #ffdd44;
  text-decoration: underline;
}

.flash-message {
  background: rgba(255, 50, 50, 0.2);
  border-left: 4px solid #ff5555;
  padding: 12px;
  margin-top: 20px;
  border-radius: 5px;
  text-align: left;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Decorative elements */
.decorative-circle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.05);
}

.circle-1 {
  width: 80px;
  height: 80px;
  top: -30px;
  right: -30px;
}

.circle-2 {
  width: 60px;
  height: 60px;
  bottom: -20px;
  left: -20px;
}

@media (max-width: 480px) {
  .box {
    padding: 30px 20px;
  }
  
  h2 {
    font-size: 28px;
  }
  
  input, button {
    padding: 14px;
  }
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="box">
    <div class="decorative-circle circle-1"></div>
    <div class="decorative-circle circle-2"></div>
    
    <h2>Welcome Back</h2>
    
    <form method="post">
      <div class="form-group">
        <div class="icon">
          <i class="fas fa-user"></i>
        </div>
        <input type="text" name="username" placeholder="Username" required>
      </div>
      
      <div class="form-group">
        <div class="icon">
          <i class="fas fa-lock"></i>
        </div>
        <input type="password" name="password" placeholder="Password" required>
      </div>
      
      <button type="submit">Login</button>
    </form>
    
    <div class="register-link">
      <p>New user? <a href="/register">Create an account</a></p>
    </div>
    
    <!-- Flash messages will appear here -->
    {% for msg in get_flashed_messages() %}
    <div class="flash-message">
      <i class="fas fa-exclamation-circle"></i> {{msg}}
    </div>
    {% endfor %}
  </div>

  <script>
    // Add focus effects to input fields
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.querySelector('.icon').style.color = '#ffcc00';
      });
      
      input.addEventListener('blur', function() {
        this.parentElement.querySelector('.icon').style.color = 'rgba(255, 255, 255, 0.7)';
      });
    });
    
    // Simple animation for the login button
    const loginBtn = document.querySelector('button');
    loginBtn.addEventListener('mousedown', function() {
      this.style.transform = 'scale(0.98)';
    });
    
    loginBtn.addEventListener('mouseup', function() {
      this.style.transform = 'scale(1)';
    });
  </script>
</body>
</html>
