<!DOCTYPE html>
<html>

<head>
    <title>Radiation Dose</title>

    <style>

        body{
            background:#34495e;
            font-family:Arial;
            color:white;
        }

        .box{
            width:800px;
            background:white;
            margin:40px auto;
            padding:30px;
            border-radius:10px;
            color:black;
            text-align:center;
        }

        img{
            max-width:600px;
            margin:20px;
            border:2px solid #444;
            border-radius:5px;
        }

        .btn{
            background:#27ae60;
            color:white;
            padding:10px 20px;
            border:none;
            cursor:pointer;
            border-radius:5px;
        }

    </style>
</head>


<body>


<div class="box">

    <h2>Radiation Dose Analysis</h2>


    {% if heatmap %}

        <h3>Tumor Heatmap</h3>

        <img src="/{{ heatmap }}">

    {% endif %}


    {% if graph %}

        <h3>Dose Distribution</h3>

        <img src="/{{ graph }}">

    {% endif %}


    <br>

    <a href="/boundary">
        <button class="btn">Back</button>
    </a>


</div>


</body>
</html>
